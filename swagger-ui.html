        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
        }

        .method-badge {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            min-width: 3.5rem;
            text-align: center;
        }

        .method-get { background: #4CAF50; color: white; }
        .method-post { background: #2196F3; color: white; }
        .method-put { background: #FF9800; color: white; }
        .method-delete { background: #F44336; color: white; }

        .json-editor {
            font-family: 'SF Mono', 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
            font-size: 0.8125rem;
            line-height: 1.6;
        }

        .response-box {

            font-size: 0.8125rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .endpoint-toggle {
            transition: transform 0.2s ease-in-out;
        }

        .endpoint-toggle.open {
            transform: rotate(180deg);
        }

        .loading-spinner {
            display: inline-block;
            width: 0.875rem;
            height: 0.875rem;
            border: 2px solid #ff6b35;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .gradient-header {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: #f5f5f5;
            border-radius: 3px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #d1d1d1;
            border-radius: 3px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #b3b3b3;
        }
    </style>

        function initApp() {
            // Mettre à jour les statistiques
            updateStats();
            
            const container = document.getElementById('endpoints-container');
            
            // Ordre logique des catégories
            const categoryOrder = [
                "Authentification",
                "Utilisateurs",
                "Événements",
                "Devis",
                "Contrats",
                "Services",
                "Prestataires",
                "Lieux",
                "Invités",
                "Paiements",
                "Messages",
                "Notifications",
                "Documents",
                "Administration",
                "Blog",
                "Témoignages",
                "Public"
            ];
            
            const allCategories = [...new Set(endpoints.map(e => e.category))];
            const orderedCategories = categoryOrder.filter(cat => allCategories.includes(cat));
            const remainingCategories = allCategories.filter(cat => !categoryOrder.includes(cat));
            const categories = [...orderedCategories, ...remainingCategories];

            categories.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'mb-12';
                
                const categoryTitle = document.createElement('h2');
                categoryTitle.className = 'text-xl font-light text-gray-700 mb-6 pb-2 border-b border-gray-200';
                categoryTitle.textContent = category;
                
                // Ajouter un compteur d'endpoints
                const categoryEndpoints = endpoints.filter(e => e.category === category);
                const countBadge = document.createElement('span');
                countBadge.className = 'ml-3 text-sm font-normal text-gray-400';
                countBadge.textContent = `(${categoryEndpoints.length})`;
                categoryTitle.appendChild(countBadge);
                
                categoryDiv.appendChild(categoryTitle);

                categoryEndpoints.forEach(endpoint => {
                    const endpointDiv = createEndpointDiv(endpoint);
                    categoryDiv.appendChild(endpointDiv);
                });

                container.appendChild(categoryDiv);
            });
        }

        function createEndpointDiv(endpoint) {
            const div = document.createElement('div');
            div.className = 'bg-white rounded-lg shadow-sm border border-gray-100 mb-3 overflow-hidden hover:shadow-md transition-shadow';

            const header = document.createElement('div');
            header.className = 'px-5 py-4 bg-gray-50 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors';
            header.onclick = () => toggleEndpoint(div);

            const headerContent = document.createElement('div');
            headerContent.className = 'flex items-center justify-between';

            const leftSection = document.createElement('div');
            leftSection.className = 'flex items-center space-x-3 flex-1';

            const methodBadge = document.createElement('span');
            methodBadge.className = `method-badge method-${endpoint.method.toLowerCase()} text-white px-2.5 py-0.5 rounded`;
            methodBadge.textContent = endpoint.method;

            const pathSpan = document.createElement('span');
            pathSpan.className = 'font-mono text-gray-700 font-normal text-sm';
            pathSpan.textContent = endpoint.path;

            if (endpoint.auth === false) {
                const badge = document.createElement('span');
                badge.className = 'ml-2 px-2 py-0.5 bg-green-50 text-green-600 text-xs font-medium rounded border border-green-200';
                badge.textContent = 'PUBLIC';
                pathSpan.appendChild(badge);
            } else if (endpoint.admin) {
                const badge = document.createElement('span');
                badge.className = 'ml-2 px-2 py-0.5 bg-amber-50 text-amber-600 text-xs font-medium rounded border border-amber-200';
                badge.textContent = 'ADMIN';
                pathSpan.appendChild(badge);
            } else {
                const badge = document.createElement('span');
                badge.className = 'ml-2 px-2 py-0.5 bg-orange-50 text-orange-600 text-xs font-medium rounded border border-orange-200';
                badge.textContent = 'AUTH';
                pathSpan.appendChild(badge);
            }

            const toggle = document.createElement('svg');
            toggle.className = 'endpoint-toggle w-4 h-4 text-gray-400';
            toggle.fill = 'none';
            toggle.stroke = 'currentColor';
            toggle.viewBox = '0 0 24 24';
            toggle.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>';

            leftSection.appendChild(methodBadge);
            leftSection.appendChild(pathSpan);
            headerContent.appendChild(leftSection);
            headerContent.appendChild(toggle);
            header.appendChild(headerContent);

            const content = document.createElement('div');
            content.className = 'endpoint-content hidden p-6';

            const description = document.createElement('p');
            description.className = 'text-gray-500 text-sm mb-6 font-light';
            description.textContent = endpoint.description;
            content.appendChild(description);

            if (endpoint.params && endpoint.params.length > 0) {
                const paramsSection = document.createElement('div');
                paramsSection.className = 'mb-6';

                const paramsTitle = document.createElement('h4');
                paramsTitle.className = 'text-xs font-medium text-gray-400 mb-3 uppercase tracking-wider';
                paramsTitle.textContent = 'Paramètres de requête';
                paramsSection.appendChild(paramsTitle);

                const paramsTable = document.createElement('div');
                paramsTable.className = 'bg-gray-50 rounded-md border border-gray-100 overflow-hidden';

                endpoint.params.forEach((param, index) => {
                    const paramRow = document.createElement('div');
                    paramRow.className = `grid grid-cols-12 gap-4 p-3 ${index !== endpoint.params.length - 1 ? 'border-b border-gray-100' : ''}`;

                    const nameCell = document.createElement('div');
                    nameCell.className = 'col-span-3';
                    const nameLabel = document.createElement('span');
                    nameLabel.className = 'font-mono font-medium text-xs text-gray-600';
                    nameLabel.textContent = param.name;
                    nameCell.appendChild(nameLabel);

                    const inputCell = document.createElement('div');
                    inputCell.className = 'col-span-7';
                    const input = document.createElement('input');
                    input.type = param.type === 'number' ? 'number' : 'text';
                    input.className = 'w-full px-2.5 py-1.5 text-xs border border-gray-200 rounded-md focus:ring-1 focus:ring-orange-500 focus:border-orange-500 transition-all bg-white text-gray-700';
                    input.id = `param-${endpoint.path}-${param.name}`;
                    input.placeholder = param.default || '';
                    input.value = param.default || '';
                    inputCell.appendChild(input);

                    const typeCell = document.createElement('div');
                    typeCell.className = 'col-span-2 text-right';
                    const typeSpan = document.createElement('span');
                    typeSpan.className = 'text-xs text-gray-400 font-normal';
                    typeSpan.textContent = param.type;
                    typeCell.appendChild(typeSpan);

                    paramRow.appendChild(nameCell);
                    paramRow.appendChild(inputCell);
                    paramRow.appendChild(typeCell);
                    paramsTable.appendChild(paramRow);
                });

                paramsSection.appendChild(paramsTable);
                content.appendChild(paramsSection);
            }

            if (endpoint.body !== null) {
                const bodySection = document.createElement('div');
                bodySection.className = 'mb-6';

                const bodyTitle = document.createElement('h4');
                bodyTitle.className = 'text-xs font-medium text-gray-400 mb-3 uppercase tracking-wider';
                bodyTitle.textContent = 'Corps de la requête';
                bodySection.appendChild(bodyTitle);

                const textarea = document.createElement('textarea');
                textarea.className = 'json-editor w-full px-4 py-3 bg-gray-50 text-gray-700 rounded-md border border-gray-200 focus:ring-1 focus:ring-orange-500 focus:border-orange-500 resize-y min-h-[180px] scrollbar-thin';
                textarea.id = `body-${endpoint.path}`;
                textarea.value = JSON.stringify(endpoint.body, null, 2);
                bodySection.appendChild(textarea);

                content.appendChild(bodySection);
            }

            const button = document.createElement('button');
            button.className = 'w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-2.5 px-6 rounded-md transition-colors duration-200 text-sm';
            button.textContent = 'Exécuter la requête';
            button.onclick = () => executeRequest(endpoint, content);
            content.appendChild(button);

            const responseSection = document.createElement('div');
            responseSection.className = 'mt-6';

            const responseTitle = document.createElement('h4');
            responseTitle.className = 'text-xs font-medium text-gray-400 mb-3 uppercase tracking-wider';
            responseTitle.textContent = 'Réponse';
            responseSection.appendChild(responseTitle);

            const responseBox = document.createElement('div');
            responseBox.className = 'response-box bg-gray-50 text-gray-700 rounded-md border border-gray-200 p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin';
            responseBox.id = `response-${endpoint.path}`;
            responseBox.textContent = 'Aucune réponse pour le moment...';
            responseSection.appendChild(responseBox);
            content.appendChild(responseSection);

            div.appendChild(header);
            div.appendChild(content);

            return div;
        }

        function toggleEndpoint(div) {
            const content = div.querySelector('.endpoint-content');
            const toggle = div.querySelector('.endpoint-toggle');

            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                toggle.classList.add('open');
            } else {
                content.classList.add('hidden');
                toggle.classList.remove('open');
            }
        }

        async function executeRequest(endpoint, contentDiv) {
            const baseUrl = document.getElementById('baseUrl').value;
            const authToken = document.getElementById('authToken').value;
            const responseBox = document.getElementById(`response-${endpoint.path}`);

            if (endpoint.auth && !authToken) {
                responseBox.className = 'response-box bg-red-50 text-red-700 rounded-md border border-red-200 p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin';
                responseBox.textContent = '❌ Erreur : Token d\'authentification requis pour cette route.';
                return;
            }

            let url = baseUrl + endpoint.path;
            const params = [];
            if (endpoint.params) {
                endpoint.params.forEach(param => {
                    const input = document.getElementById(`param-${endpoint.path}-${param.name}`);
                    if (input && input.value) {
                        params.push(`${param.name}=${encodeURIComponent(input.value)}`);
                    }
                });
            }
            if (params.length > 0) {
                url += '?' + params.join('&');
            }

            let body = null;
            if (endpoint.body !== null) {
                const bodyTextarea = document.getElementById(`body-${endpoint.path}`);
                try {
                    body = JSON.parse(bodyTextarea.value);
                } catch (e) {
                    responseBox.className = 'response-box bg-red-50 text-red-700 rounded-md border border-red-200 p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin';
                    responseBox.textContent = `❌ Erreur : JSON invalide dans le corps de la requête.\n${e.message}`;
                    return;
                }
            }

            responseBox.className = 'response-box bg-blue-50 text-blue-700 rounded-md border border-blue-200 p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin';
            responseBox.innerHTML = '<span class="loading-spinner"></span> Envoi de la requête...';

            try {
                const options = {
                    method: endpoint.method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                if (endpoint.auth && authToken) {
                    options.headers['Authorization'] = `Bearer ${authToken}`;
                }

                if (body) {
                    options.body = JSON.stringify(body);
                }

                const response = await fetch(url, options);
                const data = await response.json();

                const statusClass = response.ok ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200';
                responseBox.className = `response-box ${statusClass} rounded-md border p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin`;
                
                let responseText = '';
                const statusBadge = response.ok ? 
                    `<span class="inline-block px-2 py-0.5 bg-green-100 text-green-700 text-xs font-medium rounded mb-2 border border-green-200">HTTP ${response.status}</span>\n\n` :
                    `<span class="inline-block px-2 py-0.5 bg-red-100 text-red-700 text-xs font-medium rounded mb-2 border border-red-200">HTTP ${response.status}</span>\n\n`;
                responseText += statusBadge;
                responseText += JSON.stringify(data, null, 2);

                responseBox.innerHTML = responseText;
            } catch (error) {
                responseBox.className = 'response-box bg-red-50 text-red-700 rounded-md border border-red-200 p-4 min-h-[100px] max-h-[500px] overflow-y-auto scrollbar-thin';
                responseBox.textContent = `❌ Erreur : ${error.message}`;
            }
        }

        function updateStats() {
            const totalEndpoints = endpoints.length;
            const publicEndpoints = endpoints.filter(e => e.auth === false).length;
            const authEndpoints = endpoints.filter(e => e.auth === true && !e.admin).length;
            const adminEndpoints = endpoints.filter(e => e.admin === true).length;
            const categories = [...new Set(endpoints.map(e => e.category))].length;
            
            const statsText = `${totalEndpoints} endpoints au total • ${categories} catégories • ${publicEndpoints} publiques • ${authEndpoints} authentifiées • ${adminEndpoints} admin`;
            document.getElementById('api-stats').textContent = statsText;
        }

        initApp();
    </script>
</body>
</html>
